<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'task_manager:index' %}">IT Manager</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'task_manager:task-list' %}">Tasks</a>
            <a class="nav-link" href="{% url 'task_manager:worker-list' %}">Workers</a>
            <a class="nav-link" href="{% url 'task_manager:task-type-list' %}">Types</a>
            {% if user.is_authenticated %}
                <span class="nav-link text-info">Hi, {{ user.username }}!</span>
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link nav-link">Logout</button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
