{% extends "task_manager/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white py-3">
          <h4 class="mb-0">{% if object %}Edit Task: {{ object.name }}{% else %}Create New Task{% endif %}</h4>
        </div>
        <div class="card-body p-4">
          <form action="" method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            
            <div class="d-flex justify-content-end gap-2 mt-4">
              <a href="{% url 'task_manager:task-list' %}" class="btn btn-outline-secondary">Cancel</a>
              <button type="submit" class="btn btn-success px-4">Save Task</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
